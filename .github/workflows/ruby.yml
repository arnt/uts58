name: Ruby CI

on:
  push:
    branches: [main]
    paths: ['ruby/**']
  pull_request:
    paths: ['ruby/**']

defaults:
  run:
    working-directory: ruby

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4"]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: ruby
      - run: bundle exec rspec
