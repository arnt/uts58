name: JavaScript CI

on:
  push:
    branches: [main]
    paths: ['javascript/**']
  pull_request:
    paths: ['javascript/**']

defaults:
  run:
    working-directory: javascript

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22", "24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: javascript/package-lock.json
      - run: npm ci
      - run: npm test
